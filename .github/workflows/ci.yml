# CI/CD Workflow - xlib-harness
#
# xlib-harness 拥有独立 Go module；CI 同时验证 Go 产物、规格链接、覆盖率和外部信任门禁。

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-contract:
    name: Docs Contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate public index
        run: |
          set -euo pipefail
          test -s README.md
          test -s FEATURES.md
          test -s ACCEPTANCE.md
          test -s .github/workflows/ci.yml
          grep -q "github.com/ZoneCNH/xlib-harness" README.md
          grep -q "module/xlib-harness/SPEC.md" README.md
          grep -q "module/xlib-harness/goal.md" README.md
          grep -q "module/xlib-harness/TRACEABILITY.md" README.md
          git diff --check

  go-validation:
    name: Go Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.23"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Build, test, race, vet, coverage, and boundary gates
        run: make ci

  trust-alignment:
    name: Trust Alignment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.23"
          cache: true
      - name: Install xlibgate
        run: go install github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.0.0
      - name: Trust alignment checks
        run: |
          set -euo pipefail
          XLIBGATE="$(go env GOPATH)/bin/xlibgate"
          GOWORK=off "$XLIBGATE" check imports -path .
          GOWORK=off "$XLIBGATE" check gomod -path .
          GOWORK=off "$XLIBGATE" check baseline -path . -expected 1.23

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
