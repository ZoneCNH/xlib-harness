# CI/CD Workflow - xlib-harness
#
# xlib-harness 拥有独立 Go module；本仓库验证公开索引、规格链接和外部信任门禁。
# 当前状态: EXT_CI=OK (sre/gate)

name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-contract:
    name: Docs Contract
    runs-on: [self-hosted, Linux, X64, sre/gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Validate public index
        run: |
          set -euo pipefail
          test -s README.md
          test -s .github/workflows/ci.yml
          grep -q "github.com/ZoneCNH/xlib-harness" README.md
          grep -q "module/xlib-harness/SPEC.md" README.md
          grep -q "module/xlib-harness/goal.md" README.md
          grep -q "module/xlib-harness/TRACEABILITY.md" README.md
          git diff --check

  trust-alignment:
    name: Trust Alignment
    runs-on: [self-hosted, Linux, X64, sre/gate]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: "1.23"
      - name: Install xlibgate
        run: go install github.com/ZoneCNH/xlibgate/cmd/xlibgate@v1.0.0
      - name: Trust alignment checks
        run: |
          set -euo pipefail
          XLIBGATE="$(go env GOPATH)/bin/xlibgate"
          GOWORK=off "$XLIBGATE" trust identity --repo .
          GOWORK=off "$XLIBGATE" trust template-residue --repo .

  secret-scan:
    name: Secret Scan
    runs-on: [self-hosted, Linux, X64, sre/gate]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
